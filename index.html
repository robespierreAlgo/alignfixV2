              AlignFix
            </h2>

        <div id="sidebar-content" class="p-4"></div>
    </nav>

    <main class="main-content">
      <nav class="navbar navbar-expand-lg navbar-light py-2 border-bottom">
        <ul class="navbar-nav">
            <li id="project" class="nav-item" style="display: none;">
                <a class="nav-link" href="#project">Home</a>
            </li>
            <li id="stats" class="nav-item" style="display: none;">
                <a class="nav-link" href="#stats">Stats</a>
            </li>
            <li id="history" class="nav-item" style="display: none;">
                <a class="nav-link" href="#history">History</a>
            </li>
            <li id="scores" class="nav-item" style="display: none;">
                <a class="nav-link" href="#scores">Scores</a>
            </li>
        </ul>
        <ul class="navbar-nav ms-auto">
            <li id="home" class="nav-item">
                <a class="nav-link" href="#home">Start</a>
            </li>
            <li id="about" class="nav-item">
                <a class="nav-link" href="#about">About</a>

        </ul>

      <div class="progress-container border-bottom" id="progressbar-container">
        <div class="progress-header d-flex align-items-center justify-content-between px-3 py-2" 
             style="cursor: pointer; background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); min-height: 48px;">
          <div class="d-flex align-items-center">
            <i id="progressbar-arrow" class="fas fa-chevron-down me-2 text-muted"></i>
            <span id="progressbar-label" class="fw-medium text-dark">Show logs</span>
            <span id="progressbar-status" class="badge bg-secondary ms-2 d-none">Ready</span>
          </div>
          <div class="d-flex align-items-center gap-2">
            <div id="progressbar-info" class="small text-muted d-none">
              <span id="current-operation">Initializing...</span>
            </div>
            <div class="d-flex align-items-center gap-2">
              <div class="progress" style="width: 100px; height: 6px;">
                <div id="progressbar" class="progress-bar" 
                     role="progressbar" style="width: 0%" 
                     aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
              </div>
              <span id="progressbar-percentage" class="small fw-bold text-dark" style="min-width: 30px;">0%</span>
            </div>
          </div>
        </div>
        <div id="log" class="collapse">
          <div class="p-3" style="background: #f8f9fa; border-top: 1px solid #dee2e6; max-height: 250px; overflow-y: auto;">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <small class="text-muted">
                <i class="fas fa-terminal me-1"></i>Process Logs
              </small>
              <button id="clear-logs-btn" class="btn btn-sm btn-outline-secondary" title="Clear logs">
                <i class="fas fa-trash-alt"></i>
              </button>
            </div>
            <div id="log-messages" class="font-monospace small"></div>
          </div>
        </div>
      </div>
      <div class="mt-4 mb-4">
        <div class="loader"></div>
        <div id="app"></div>
        <div id="stats"></div>
      </div>


    </main>

  </div>
    <script>
(function () {
    var old = console.log;
    var oldError = console.error;
    var logger = document.getElementById('log-messages');
    var logContainer = document.getElementById('log');
    var progressbar = document.getElementById('progressbar');
    var arrow = document.getElementById('progressbar-arrow');
    var label = document.getElementById('progressbar-label');
    var percentage = document.getElementById('progressbar-percentage');
    var status = document.getElementById('progressbar-status');
    var currentOp = document.getElementById('current-operation');
    var progressInfo = document.getElementById('progressbar-info');
    
    function updateLabel() {
        const isOpen = logContainer.classList.contains('show');
        if (isOpen) {
            arrow.className = 'fas fa-chevron-up me-2 text-muted';
            label.textContent = 'Hide logs';
        } else {
            arrow.className = 'fas fa-chevron-down me-2 text-muted';
            label.textContent = 'Show logs';
        }
    }

    function updateProgress(value, operation = null) {
        const clampedValue = Math.max(0, Math.min(100, value));
        progressbar.style.width = clampedValue + '%';
        progressbar.setAttribute('aria-valuenow', clampedValue);
        percentage.textContent = clampedValue + '%';
        
        // Update colors
        progressbar.className = 'progress-bar';
        status.classList.remove('d-none');
        
        if (clampedValue === 100) {
            progressbar.classList.add('bg-success');
            status.textContent = 'Complete';
            status.className = 'badge bg-success ms-2';
        } else if (clampedValue > 0) {
            progressbar.classList.add('bg-primary');
            status.textContent = 'Processing';
            status.className = 'badge bg-primary ms-2';
        } else {
            progressbar.classList.add('bg-secondary');
            status.textContent = 'Ready';
            status.className = 'badge bg-secondary ms-2';
        }
        
        if (operation) {
            currentOp.textContent = operation;
            progressInfo.classList.remove('d-none');
        }
    }

    function addLogMessage(text, isError = false) {
        const timestamp = new Date().toLocaleTimeString();
        const messageDiv = document.createElement('div');
        messageDiv.className = isError ? 'text-danger mb-1' : 'text-dark mb-1';
        messageDiv.innerHTML = `<span class="text-muted">[${timestamp}]</span> ${text}`;
        
        if (text) {
          logger.appendChild(messageDiv);
        }

        // Scroll to bottom - get the parent container that has the scroll
        const logContainer = logger.parentElement;
        if (logContainer) {
            // Use setTimeout to ensure the DOM has updated before scrolling
            setTimeout(() => {
                logContainer.scrollTop = logContainer.scrollHeight;
            }, 50);
        }
        
        // Fallback: also try scrolling the logger itself
        setTimeout(() => {
            logger.scrollTop = logger.scrollHeight;
        }, 50);
    }

    function toggleLogs() {
        
        if (logContainer.classList.contains('show')) {
            logContainer.classList.remove('show');
        } else {
            logContainer.classList.add('show');
        }

        if (logContainer.classList.contains('show')) {
            console.log('');
        }
        updateLabel();
    }

    // Console overrides
    console.log = function (...args) {
        const text = args.join(' ');
        
        // Handle progress updates
        const progressMatch = text.match(/^progress:(\d{1,3})$/);
        if (progressMatch) {
            updateProgress(parseInt(progressMatch[1]));
            return;
        }
        
        // Handle operation updates
        const operationMatch = text.match(/^operation:(.+)$/);
        if (operationMatch) {
            updateProgress(parseInt(progressbar.getAttribute('aria-valuenow')), operationMatch[1]);
            return;
        }
        
        // Skip our debug messages from being added to logs
        if (!text.includes('Toggle logs') && !text.includes('Hiding logs') && !text.includes('Showing logs')) {
            addLogMessage(text);
        }
        old.apply(console, args);
    };

    console.error = function (...args) {
        const text = args.join(' ');
        addLogMessage(text, true);
        oldError.apply(console, args);
    };

    // Wait for DOM to be ready
    function initializeEventListeners() {
        const progressHeader = document.querySelector('.progress-header');
        const clearBtn = document.getElementById('clear-logs-btn');
        
        if (progressHeader) {
            progressHeader.addEventListener('click', function(e) {
                toggleLogs();
            });
        }
        
        if (clearBtn) {
            clearBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                logger.innerHTML = '';
                addLogMessage('Logs cleared');
            });
        } else {
            console.error('Clear button not found');
        }
    }

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeEventListeners);
    } else {
        initializeEventListeners();
    }

    // Initialize
    updateLabel();
    updateProgress(0);
})();
</script>
